{% extends "base.html" %}
{% block title %}Login — FaceGuard{% endblock %}
{% block nav %}
  <span class="small">Attendance with face + liveness</span>
{% endblock %}
{% block body %}
<div class="card">
  <h1>Sign in</h1>
  <p class="small">Teachers create sessions; students join and mark attendance.</p>
  <div id="msg"></div>
  <form id="login-form">
    <label for="username">Username</label>
    <input id="username" name="username" autocomplete="username" required>
    <label for="password">Password</label>
    <input id="password" type="password" name="password" autocomplete="current-password" required>

    <div id="org-code-container" style="display: none; animation: slideIn 0.3s ease;">
      <label for="org_code">Organization Code</label>
      <input id="org_code" name="org_code" placeholder="e.g. HARVARD" style="border-color: var(--accent);">
    </div>

    <label for="role">Role</label>
    <select id="role" name="role">
      <option value="student">Student</option>
      <option value="teacher">Teacher</option>
      <option value="admin">Administrator</option>
    </select>
    <button type="submit" class="btn">Log in</button>
    <button type="button" class="btn secondary" id="signup-btn">Create account</button>
    <div style="margin-top: 1rem; text-align: center;">
      <a href="/forgot-password" class="small">Forgot your password?</a>
    </div>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
  const msg = document.getElementById('msg');
  function show(t, cls) {
    msg.textContent = t;
    msg.className = 'show ' + (cls || 'info');
  }
  let isSignupMode = false;

  document.getElementById('signup-btn').addEventListener('click', async () => {
    if (!isSignupMode) {
      isSignupMode = true;
      document.getElementById('org-code-container').style.display = 'block';
      document.querySelector('button[type="submit"]').textContent = 'Complete Signup';
      document.getElementById('signup-btn').style.display = 'none';
      show('Enter an Organization Code to anchor your account to your institution.', 'info');
      return;
    }
  });

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const role = document.getElementById('role').value;

    if (isSignupMode) {
      const org_code = document.getElementById('org_code').value.trim();
      if (!username || !password || !org_code) { show('Enter username, password, and org code', 'err'); return; }

      const r = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, role, org_code }),
        credentials: 'same-origin'
      });

      const d = await r.json();
      if (!r.ok) { show(d.error || 'Signup failed', 'err'); return; }

      const loginR = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, role }),
        credentials: 'same-origin'
      });
      const loginD = await loginR.json();
      if (loginR.ok) window.location.href = '/complete-profile';
      else show(loginD.error || 'Account created. Please log in.', 'err');
      return;
    }

    const r = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, role }),
      credentials: 'same-origin'
    });
    const d = await r.json();
    if (!r.ok) { show(d.error || 'Login failed', 'err'); return; }

    const pr = await fetch('/api/profile/me', { credentials: 'same-origin' });
    const pd = await pr.json();
    if (pd.has_profile || d.role === 'admin') {
      if (d.role === 'admin') window.location.href = '/admin';
      else if (d.role === 'teacher') window.location.href = '/teacher';
      else window.location.href = '/student';
    } else {
      window.location.href = '/complete-profile';
    }
  });
</script>
{% endblock %}
