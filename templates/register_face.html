{% extends "base.html" %}
{% block title %}Register face — FaceGuard{% endblock %}
{% block nav %}
  <a href="/student">Back</a>
{% endblock %}
{% block body %}
<div class="card">
  <h1>Register face</h1>
  <p class="small">Hold still; we capture several frames to build one averaged encoding.</p>
  <div id="msg"></div>
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="cv" hidden></canvas>
  <button type="button" class="btn" id="start-cam">Start camera</button>
  <button type="button" class="btn" id="capture" disabled>Capture samples</button>
</div>
{% endblock %}
{% block scripts %}
<script>
  const msg = document.getElementById('msg');
  const vid = document.getElementById('vid');
  const cv = document.getElementById('cv');
  let stream;

  function show(t, cls) {
    msg.textContent = t;
    msg.className = 'show ' + (cls || 'info');
  }

  async function parseJsonResponse(r) {
    const text = await r.text();
    try {
      return { ok: true, data: JSON.parse(text) };
    } catch (e) {
      return {
        ok: false,
        status: r.status,
        raw: text,
      };
    }
  }

  fetch('/api/me', { credentials: 'include' }).then(r => r.json()).then(d => {
    if (!d.logged_in || d.role !== 'student') window.location.href = '/login';
  });

  document.getElementById('start-cam').addEventListener('click', async () => {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
        audio: false
      });
      vid.srcObject = stream;
      document.getElementById('capture').disabled = false;
      show('Camera on. Position your face in frame.', 'ok');
    } catch (e) {
      show('Camera permission denied or unavailable.', 'err');
    }
  });

  document.getElementById('capture').addEventListener('click', async () => {
    const ctx = cv.getContext('2d');
    let w = vid.videoWidth;
    let h = vid.videoHeight;
    const maxDim = 480;
    if (Math.max(w, h) > maxDim) {
      if (w > h) { h = Math.round((h * maxDim) / w); w = maxDim; }
      else { w = Math.round((w * maxDim) / h); h = maxDim; }
    }
    cv.width = w;
    cv.height = h;

    const images = [];
    const steps = [
      'Look straight ahead...',
      'Look slightly left...',
      'Look slightly right...',
      'Look slightly up...'
    ];

    for (let i = 0; i < steps.length; i++) {
      show(steps[i], 'info');
      ctx.drawImage(vid, 0, 0, w, h);
      images.push(cv.toDataURL('image/jpeg', 0.22));
      await new Promise(r => setTimeout(r, 500));
    }

    document.getElementById('capture').disabled = true;
    show('Saving face profile...', 'info');
    try {
      const r = await fetch('/api/face/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ images }),
        credentials: 'include'
      });
      const parsed = await parseJsonResponse(r);
      if (!parsed.ok) {
        const snippet = (parsed.raw || '').slice(0, 160).replace(/\s+/g, ' ');
        show('Server crashed before returning JSON. Response: ' + snippet, 'err');
        return;
      }
      const d = parsed.data;
      if (!r.ok) {
        show(d.error || ('Request failed (' + r.status + ')'), 'err');
        return;
      }
      show('Registered. Samples saved: ' + d.lbph_samples, 'ok');
    } catch (e) {
      show('Network error: ' + (e.message || String(e)), 'err');
    } finally {
      document.getElementById('capture').disabled = false;
    }
  });
</script>
{% endblock %}
