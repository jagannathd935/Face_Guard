<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}FaceGuard{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <meta name="theme-color" content="#3b82f6">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-192.png') }}">
  <script>
    // Check initial theme before render to avoid flash
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
</head>
<body>
  <header>
    <strong>FaceGuard</strong>
    <nav>
      {% block nav %}{% endblock %}
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
        <span class="icon">🌙</span>
      </button>
    </nav>
  </header>
  <main>
    {% block body %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
  <script>
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = themeToggle.querySelector('.icon');
    
    function updateIcon(theme) {
      themeIcon.textContent = theme === 'dark' ? '🌙' : '☀️';
    }

    const currentTheme = document.documentElement.getAttribute('data-theme');
    updateIcon(currentTheme);

    themeToggle.addEventListener('click', () => {
      let theme = document.documentElement.getAttribute('data-theme');
      let newTheme = theme === 'dark' ? 'light' : 'dark';
      
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateIcon(newTheme);
    });

    // Scroll Reveal Animations
    const revealElements = document.querySelectorAll('.reveal');
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if(entry.isIntersecting) {
          entry.target.classList.add('active');
        }
      });
    }, { threshold: 0.1 });

    revealElements.forEach(el => revealObserver.observe(el));

    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/static/sw.js').then(registration => {
          console.log('SW registered: ', registration.scope);
        }).catch(err => {
          console.log('SW registration failed: ', err);
        });
      });
    }

    // CSRF Protection for AJAX
    const csrfToken = "{{ csrf_token() }}";
    const originalFetch = window.fetch;
    window.fetch = function() {
        let args = Array.from(arguments);
        if (args.length >= 2 && args[1].method && ['POST', 'PUT', 'DELETE', 'PATCH'].includes(args[1].method.toUpperCase())) {
            args[1].headers = args[1].headers || {};
            args[1].headers['X-CSRFToken'] = csrfToken;
        }
        return originalFetch.apply(this, args);
    };
  </script>
</body>
</html>
