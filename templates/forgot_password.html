{% extends "base.html" %}
{% block title %}Recover Account — FaceGuard{% endblock %}
{% block nav %}
  <a href="/login" class="small">Back to Login</a>
{% endblock %}
{% block body %}
<div class="card" style="max-width: 500px;">
  <h1>Recover Account</h1>
  <p class="small">Enter your username to recover your forgotten password.</p>
  <div id="msg"></div>
  
  <form id="recover-form">
    <label for="username">Username</label>
    <input id="username" name="username" required>
    <button type="submit" class="btn" style="margin-top:1rem;">Find Account</button>
  </form>

  <form id="reset-form" style="display: none; margin-top: 1.5rem;">
    <hr style="border-color: var(--glass-border); margin-bottom: 1.5rem;">
    <h3 id="question-text" style="color: var(--heading-color);"></h3>
    
    <label for="security_answer">Your Answer</label>
    <input id="security_answer" name="security_answer" autocomplete="off" required>
    
    <label for="new_password">New Password</label>
    <input id="new_password" type="password" name="new_password" autocomplete="new-password" required>
    
    <button type="submit" class="btn" style="width: 100%; margin-top:1rem;">Reset Password</button>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
  let recoverUserId = null;
  const msg = document.getElementById('msg');
  
  function show(t, cls) {
    msg.textContent = t;
    msg.className = 'show ' + (cls || 'info');
  }

  document.getElementById('recover-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    
    const r = await fetch('/api/recover-account', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username })
    });

    const d = await r.json();
    if (!r.ok) {
      show(d.error || 'Failed to find account', 'err');
      return;
    }
    
    document.getElementById('recover-form').style.display = 'none';
    document.getElementById('reset-form').style.display = 'block';
    document.getElementById('question-text').textContent = d.security_question;
    recoverUserId = d.user_id;
    show('Answer the security question to reset your password.', 'info');
  });

  document.getElementById('reset-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const answer = document.getElementById('security_answer').value.trim();
    const newPassword = document.getElementById('new_password').value;
    
    const r = await fetch('/api/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: recoverUserId, security_answer: answer, new_password: newPassword })
    });

    const d = await r.json();
    if (!r.ok) {
      show(d.error || 'Failed to reset password', 'err');
      return;
    }
    
    show('Password successfully reset! Redirecting to login...', 'ok');
    setTimeout(() => {
      window.location.href = '/login';
    }, 2000);
  });
</script>
{% endblock %}
